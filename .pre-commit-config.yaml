default_install_hook_types:
  - pre-commit
repos:
  - repo: local
    hooks:
      - id: check-asf-header
        name: check ASF Header
        entry: python tests/lint/check_asf_header.py --check
        language: system
        pass_filenames: false
        verbose: false
      - id: check-file-type
        name: check file types
        entry: python tests/lint/check_file_type.py
        language: system
        pass_filenames: false
        verbose: false
      - id: check-version-consistency
        name: check version consistency
        entry: python tests/lint/check_version.py --cpp  # TODO: add `--rust` once Rust binding matures
        language: system
        pass_filenames: false
        verbose: false
      - id: check-added-large-files
        name: check added large files
        entry: check-added-large-files
        language: system
      - id: check-case-conflict
        name: check case conflict
        entry: check-case-conflict
        language: system
      - id: check-merge-conflict
        name: check merge conflict
        entry: check-merge-conflict
        language: system
        types: [text]
      - id: check-symlinks
        name: check symlinks
        entry: check-symlinks
        language: system
        types: [symlink]
      - id: end-of-file-fixer
        name: fix end of files
        entry: end-of-file-fixer
        language: system
        types: [text]
      - id: mixed-line-ending
        name: mixed line ending
        entry: mixed-line-ending
        language: system
        types: [text]
      - id: requirements-txt-fixer
        name: fix requirements.txt
        entry: requirements-txt-fixer
        language: system
        files: (^|/)requirements.*\.txt$
      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]
      - id: check-yaml
        name: check yaml
        entry: check-yaml
        language: system
        types: [yaml]
      - id: check-toml
        name: check toml
        entry: check-toml
        language: system
        types: [toml]
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: system
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types_or: [python, pyi, jupyter]
      - id: ty
        name: ty check
        entry: uv run --no-sync ty check --error-on-warning
        language: system
        pass_filenames: false
        types: [python]
      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        files: \.(c|cc|cpp|cxx|h|hh|hpp|hxx|cu|cuh|m|mm)$
      - id: yamllint
        name: yamllint
        entry: yamllint --config-file .yamllint.yaml
        language: system
        types: [yaml]
      - id: cython-lint
        name: cython-lint
        entry: cython-lint --max-line-length=120
        language: system
        files: \.(pyx|pxd|pxi)$
      - id: double-quote-cython-strings
        name: double quote cython strings
        entry: double-quote-cython-strings
        language: system
        files: \.(pyx|pxd|pxi)$
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
      - id: cmake-format
        name: cmake-format
        entry: cmake-format -i
        language: system
        files: (^|/)(CMakeLists\.txt|.*\.cmake)$
      - id: cmake-lint
        name: cmake-lint
        entry: cmake-lint
        language: system
        files: (^|/)(CMakeLists\.txt|.*\.cmake)$
