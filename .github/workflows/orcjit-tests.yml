name: TVM-FFI-OrcJIT CI Tests

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.9']

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install LLVM (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20-dev clang-20
          echo "CC=clang-20" >> $GITHUB_ENV
          echo "CXX=clang++-20" >> $GITHUB_ENV

      # - name: Install LLVM (macOS)
      #   if: runner.os == 'macOS'
      #   run: |
      #     brew install llvm@18
      #     echo "LLVM_DIR=$(brew --prefix llvm@18)" >> $GITHUB_ENV
      #     echo "CC=$(brew --prefix llvm@18)/bin/clang" >> $GITHUB_ENV
      #     echo "CXX=$(brew --prefix llvm@18)/bin/clang++" >> $GITHUB_ENV

      # - name: Install uv
      #   uses: astral-sh/setup-uv@v6

      - name: Build and install tvm-ffi-orcjit
        working-directory: addons/tvm-ffi-orcjit
        run: |
          pip install -e -v .

      - name: Install test dependencies
        run: |
          pip install pytest

      - name: Build test object files
        working-directory: addons/tvm-ffi-orcjit/tests
        run: |
          cmake -B build
          cmake --build build --target install

      - name: Run tests
        working-directory: addons/tvm-ffi-orcjit
        run: |
          pytest tests/ -v

      - name: Run example
        working-directory: addons/tvm-ffi-orcjit/examples/quick-start
        run: |
          cmake -B build
          cmake --build build
          python run.py
